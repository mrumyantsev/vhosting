version: '3.1'

services:
  db:
    container_name: vh-db
    hostname: vh-db
    restart: unless-stopped
    image: postgres:${POSTGRES_VER}-alpine${ALPINE_VER}
    environment:
      - PGDATA=/data
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    volumes:
      - ${DB_LOCAL_DIR}:/data
    networks:
      - vh-internal-network
    ports:
      - ${DB_PORT}:5432

  server:
    container_name: vh-server
    hostname: vh-server
    restart: unless-stopped
    depends_on:
      - db
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - GO_VER=${GO_VER}
        - ALPINE_VER=${ALPINE_VER}
        - APP_NAME=${SERVER_APP_NAME}
    env_file:
      - ./.env
    environment:
      - DB_HOSTNAME=vh-db
    networks:
      - vh-internal-network
      - vh-external-network
    ports:
      - ${HTTP_SERVER_LISTEN_PORT}:${HTTP_SERVER_LISTEN_PORT}

  web:
    container_name: vh-web
    hostname: vh-web
    restart: unless-stopped
    depends_on:
      - server
    image: nginx:${NGINX_VER}-alpine${ALPINE_VER}
    volumes:
      - ${WEB_LOCAL_DIR}:/usr/share/nginx/html
    networks:
      - vh-external-network
    ports:
      - ${WEB_PORT}:80

networks:
  vh-internal-network:
    name: vh-internal-network
    driver: bridge
    internal: true

  vh-external-network:
    name: vh-external-network
    driver: bridge
    internal: false
